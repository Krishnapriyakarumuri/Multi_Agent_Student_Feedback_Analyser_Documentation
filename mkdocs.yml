site_name: Student Feedback Intelligence Platform
site_description: AI-Powered Student Feedback Analysis System
site_author: MindLattice

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.details
  - admonition

nav:
  - Home: index.md

  - Getting Started:
      - getting-started.md

  - Architecture:
      - System Architecture: architecture/system-architecture.md
      - Agent Architecture: architecture/agent-architecture.md
      - Data Flow: architecture/data-flow.md

  - AI Pipeline:
      - Preprocessing: pipeline/preprocessing.md
      - Sentiment Analysis: pipeline/sentiment-analysis.md
      - Theme Discovery: pipeline/theme-discovery.md
      - Bias Handling: pipeline/bias-handling.md
      - Recommendations: pipeline/recommendations.md

  - Dashboard:
      - Overview: dashboard/overview.md
      - Upload Feedback: dashboard/upload-feedback.md
      - Theme Insights: dashboard/theme-insights.md
      - Reports: dashboard/reports.md

  - Backend:
      - FastAPI: backend/fastapi.md
      - Agents: backend/agents.md
      - Memory Layer: backend/memory.md

  - Dataset:
      - Dataset Overview: data/dataset.md
      - Storage: data/storage.md

  - API:
      - Endpoints: api/endpoints.md

  - Observability:
      - Logging: observability/logging.md
      - Telemetry: observability/telemetry.md

  - Deployment:
      - Docker Setup: deployment/docker.md
      - Environment Setup: deployment/setup.md